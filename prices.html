              <li><a class="dropdown-item" href="countdown.html">倒數計時頁</a></li>
            </ul>
          </div>
        </aside>
        <main class="col-md-6">
          <h2>裝備商品計價器</h2>
          <p>從下拉選單選擇裝備、設定數量，即可計算小計並加入採購單。</p>

          <div class="card mb-3 p-3">
            <div class="row g-2 align-items-end">
              <div class="col-md-6">
                <label class="form-label">商品</label>
                <select id="prd-select" class="form-select"></select>
              </div>
              <div class="col-md-3">
                <label class="form-label">單價 (NT$)</label>
                <input id="unit-price" class="form-control" readonly>
              </div>
              <div class="col-md-3">
                <label class="form-label">數量</label>
                <input id="qty" type="number" class="form-control" min="1" value="1">
              </div>
            </div>
            <div class="mt-3 d-flex gap-2">
              <button id="add-btn" class="btn btn-success">加入採購單</button>
              <div class="ms-auto align-self-center">小計：<strong id="subtotal">NT$0</strong></div>
            </div>
          </div>

          <h5>採購清單</h5>
          <div class="table-responsive mb-3"><table class="table table-sm" id="cart-table"><thead><tr><th>商品</th><th class="text-end">單價</th><th class="text-end">數量</th><th class="text-end">小計</th><th></th></tr></thead><tbody></tbody></table></div>
          <div class="d-flex justify-content-between"><div></div><div>總計：<strong id="grand-total">NT$0</strong></div></div>

          <script>
            (function(){
              const select = document.getElementById('prd-select');
              const unit = document.getElementById('unit-price');
              const qty = document.getElementById('qty');
              const subtotal = document.getElementById('subtotal');
              const addBtn = document.getElementById('add-btn');
              const cartTable = document.querySelector('#cart-table tbody');
              const grandTotalEl = document.getElementById('grand-total');
              const cart = [];

              function fmt(n){ return 'NT$' + n.toLocaleString(); }

              function renderCart(){ cartTable.innerHTML=''; let total=0; cart.forEach((it,idx)=>{ const tr=document.createElement('tr'); tr.innerHTML = `<td>${it.name}</td><td class="text-end">${fmt(it.price)}</td><td class="text-end">${it.qty}</td><td class="text-end">${fmt(it.price*it.qty)}</td><td class="text-end"><button class="btn btn-sm btn-danger remove-btn" data-i="${idx}">移除</button></td>`; cartTable.appendChild(tr); total += it.price*it.qty; }); grandTotalEl.textContent = fmt(total); }

              fetch('json/products.json').then(r=>{ if(!r.ok) throw new Error('no products'); return r.json(); }).then(products=>{
                products.forEach(p=>{ const o=document.createElement('option'); o.value=p.id; o.textContent=p.name; o.dataset.price = p.price; select.appendChild(o); });
                select.selectedIndex = 0; updateUnit(); updateSubtotal();
              }).catch(err=>{
                document.getElementById('prd-select').innerHTML = '<option value="">無法載入裝備</option>';
                console.error('load products error', err);
              });

              function getProductFromSelect(){ const opt = select.selectedOptions[0]; if(!opt) return null; return { id: opt.value, name: opt.textContent, price: parseInt(opt.dataset.price||0) }; }
              function updateUnit(){ const p = getProductFromSelect(); unit.value = p ? p.price.toLocaleString() : ''; }
              function updateSubtotal(){ const p = getProductFromSelect(); const s = p ? p.price * Math.max(1, parseInt(qty.value||1)) : 0; subtotal.textContent = fmt(s); return s; }

              select.addEventListener('change', ()=>{ updateUnit(); updateSubtotal(); });
              qty.addEventListener('input', ()=>{ updateSubtotal(); });

              addBtn.addEventListener('click', ()=>{
                const p = getProductFromSelect(); if(!p || !p.id) return; const q = Math.max(1, parseInt(qty.value||1)); cart.push({name:p.name, price:p.price, qty:q}); renderCart();
              });

              cartTable.addEventListener('click', e=>{ if(e.target.matches('.remove-btn')){ const i=parseInt(e.target.dataset.i); cart.splice(i,1); renderCart(); } });
            })();
          </script>
        </main>
